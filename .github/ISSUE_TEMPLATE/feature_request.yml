name: Feature request
description: Suggest a change to the action.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: What's the use case? What's painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What input, output, or behavior would help? A sketch is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
