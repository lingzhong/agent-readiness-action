name: release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # v7.2.1
        with:
          token: ${{ secrets.RELEASE_PAT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag-major:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Update floating major/minor tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Extract v0.1 from v0.1.2, or v1 from v1.2.3.
          if [[ "$tag" =~ ^v0\.[0-9]+\.[0-9]+$ ]]; then
            floating="${tag%.*}"
          elif [[ "$tag" =~ ^v[1-9][0-9]*\.[0-9]+\.[0-9]+$ ]]; then
            floating="${tag%%.*}"
          else
            echo "tag $tag is not a semver release; skipping"
            exit 0
          fi
          git tag -f "$floating" "$tag"
          git push origin "$floating" --force
